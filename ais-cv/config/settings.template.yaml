# AIS CV Configuration Template
# Copy this to settings.yaml and fill in your values
# DO NOT commit settings.yaml - it contains credentials!

# Camera Configuration
camera:
  name: "Furnace Opening"
  id: "CAM-1"
  role: "primary"
  
  # Dahua NVR RTSP URL (Sub Stream for processing)
  # Replace USER, PASSWORD, NVR_IP with actual values
  rtsp_url: "rtsp://USER:PASSWORD@NVR_IP:554/cam/realmonitor?channel=1&subtype=1"
  
  # Stream settings (match NVR config)
  resolution: [704, 576]
  fps: 25
  codec: "h265"
  
  # Reconnection settings
  reconnect_attempts: 5
  reconnect_delay_seconds: 5

# Region of Interest (to be calibrated with actual camera view)
roi:
  furnace_door:
    x: 100
    y: 50
    width: 500
    height: 400
  # Will be refined during calibration

# Detection Thresholds (to be tuned during validation)
detection:
  # Luminosity (0-255) - hot steel glows bright
  luminosity_threshold: 180
  luminosity_min_pixels: 1000  # Minimum bright pixels to count as "hot stock"
  
  # Motion detection
  motion_threshold: 25         # Pixel difference threshold
  motion_min_area: 500         # Minimum changed area
  
  # State timing
  break_threshold_seconds: 120  # 2 minutes without stock = BREAK
  min_run_duration_seconds: 10  # Ignore very brief detections
  
  # Processing
  process_fps: 1               # Analyze 1 frame per second (sufficient)

# Photo Capture
photos:
  output_dir: "data/photos"
  on_state_change: true
  periodic_interval_seconds: 300  # Every 5 minutes during states
  
# Logging
logging:
  output_dir: "data/logs"
  level: "INFO"
  rotation: "daily"

# Multi-view mill stand line counter
mill_stand_lines:
  enabled: false
  views:
  - name: "View 1"
    camera:
      rtsp_url: "rtsp://USER:PASSWORD@NVR_IP:554/cam/realmonitor?channel=2&subtype=1"
      resolution: [1920, 1080]
      fps: 25
    roi:
      start: [0, 0]
      end: [1920, 1080]
    line1:
      start: [0, 0]
      end: [0, 0]
    line2:
      start: [0, 0]
      end: [0, 0]
  - name: "View 2"
    camera:
      rtsp_url: "rtsp://USER:PASSWORD@NVR_IP:554/cam/realmonitor?channel=3&subtype=1"
      resolution: [1920, 1080]
      fps: 25
    roi:
      start: [0, 0]
      end: [1920, 1080]
    line1:
      start: [0, 0]
      end: [0, 0]
    line2:
      start: [0, 0]
      end: [0, 0]
  - name: "View 3"
    camera:
      rtsp_url: "rtsp://USER:PASSWORD@NVR_IP:554/cam/realmonitor?channel=4&subtype=1"
      resolution: [1920, 1080]
      fps: 25
    roi:
      start: [0, 0]
      end: [1920, 1080]
    line1:
      start: [0, 0]
      end: [0, 0]
    line2:
      start: [0, 0]
      end: [0, 0]
  voting:
    window_seconds: 5.0
    min_stands_required: null
  counting:
    luminosity_threshold: 160
    min_bright_pixels: 100
    sequence_timeout: 3.0
    min_travel_time: 0.0
    min_consecutive_frames: 2
    line_thickness: 10
    hot_metal_filter_enabled: true
    min_saturation: 20
    min_red_dominance: 1.1
    min_warmth_ratio: 1.05
    target_resolution: [704, 576]
