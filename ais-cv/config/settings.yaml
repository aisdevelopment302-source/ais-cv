camera:
  name: Furnace Opening
  id: CAM-1
  role: primary
  rtsp_url: rtsp://USER:PASSWORD@NVR_IP:554/cam/realmonitor?channel=1&subtype=1
  resolution:
  - 704
  - 576
  fps: 25
  codec: h265
  reconnect_attempts: 5
  reconnect_delay_seconds: 5
roi:
  furnace_door:
    x: 100
    y: 50
    width: 500
    height: 400
detection:
  luminosity_threshold: 180
  luminosity_min_pixels: 1000
  motion_threshold: 25
  motion_min_area: 500
  break_threshold_seconds: 300
  min_run_duration_seconds: 10
counting_lines:
  line1:
    start:
    - 480
    - 225
    end:
    - 540
    - 215
  line2:
    start:
    - 525
    - 280
    end:
    - 585
    - 270
  line3:
    start:
    - 565
    - 335
    end:
    - 630
    - 325
  flow_direction:
    start:
    - 530
    - 215
    end:
    - 620
    - 330
counting:
  luminosity_threshold: 200
  min_bright_pixels: 150
  sequence_timeout: 4.0
  min_travel_time: 0.2
  line_thickness: 10
  min_consecutive_frames: 3
  human_filter_enabled: true
  max_aspect_ratio: 1.5
  min_blob_width: 30
  hot_metal_filter_enabled: true
  min_red_dominance: 1.15
  min_saturation: 30
  min_warmth_ratio: 1.1
mill_stand:
  enabled: true
  video_file: recordings/mill stand view.mp4
  camera:
    rtsp_url: rtsp://USER:PASSWORD@NVR_IP:554/cam/realmonitor?channel=2&subtype=1
