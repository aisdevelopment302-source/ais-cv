<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day Detail - AIS Production</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for timeline */
    .timeline-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .timeline-scroll::-webkit-scrollbar-track {
      background: #1f2937;
    }
    .timeline-scroll::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 2px;
    }
  </style>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, collection, query, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCBXxSsvjnFzGMMFbHCYouokIQydObeElo",
      authDomain: "ais-production-e013c.firebaseapp.com",
      projectId: "ais-production-e013c",
      storageBucket: "ais-production-e013c.firebasestorage.app",
      messagingSenderId: "565647781984",
      appId: "1:565647781984:web:0f05c2436afdcc7a0b1305"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get date from URL params
    const urlParams = new URLSearchParams(window.location.search);
    const dateStr = urlParams.get('date') || new Date().toISOString().split('T')[0];
    const isToday = dateStr === new Date().toISOString().split('T')[0];

    // DOM elements
    const dateDisplay = document.getElementById('dateDisplay');
    const totalCount = document.getElementById('totalCount');
    const totalRun = document.getElementById('totalRun');
    const totalBreak = document.getElementById('totalBreak');
    const timeline = document.getElementById('timeline');
    const loading = document.getElementById('loading');

    // Stopwatch state
    let currentSessionStart = null;
    let currentSessionType = null;
    let timerInterval = null;

    // Scale: 1 hour = 100px, so 1 minute = 100/60 px
    const PX_PER_MINUTE = 100 / 60;
    const MIN_HEIGHT = 60; // Minimum height for sessions

    // Format date for display
    function formatDateLong(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-IN', { 
        weekday: 'long', 
        year: 'numeric',
        month: 'long', 
        day: 'numeric' 
      });
    }

    // Format duration in minutes to display string
    function formatDuration(minutes) {
      if (minutes === null || minutes === undefined || minutes === 0) return '0m';
      const totalMins = Math.ceil(minutes);
      if (totalMins < 1) return '<1m';
      const hrs = Math.floor(totalMins / 60);
      const mins = totalMins % 60;
      if (hrs > 0) return `${hrs}h ${mins}m`;
      return `${mins}m`;
    }

    // Format elapsed time as MM:SS or H:MM:SS for stopwatch
    function formatElapsedTime(seconds) {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      
      if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Format time from Firestore timestamp
    function formatTime(timestamp) {
      if (!timestamp) return '--:--';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleTimeString('en-IN', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true,
        timeZone: 'Asia/Kolkata'
      });
    }

    // Format average speed (seconds per piece) for display
    function formatAvgSpeed(avgSpeedSeconds) {
      if (!avgSpeedSeconds || avgSpeedSeconds === 0) return '--';
      if (avgSpeedSeconds < 60) return `${Math.round(avgSpeedSeconds)}s/pc`;
      const mins = Math.floor(avgSpeedSeconds / 60);
      const secs = Math.round(avgSpeedSeconds % 60);
      return `${mins}m ${secs}s/pc`;
    }

    // Calculate average time per piece (fallback for active sessions)
    function calcAvgTime(durationMinutes, pieceCount) {
      if (!pieceCount || pieceCount === 0) return '--';
      const seconds = (durationMinutes * 60) / pieceCount;
      if (seconds < 60) return `${Math.round(seconds)}s/pc`;
      const mins = Math.floor(seconds / 60);
      const secs = Math.round(seconds % 60);
      return `${mins}m ${secs}s/pc`;
    }

    // Calculate bar height based on duration
    function calcBarHeight(durationMinutes) {
      const height = durationMinutes * PX_PER_MINUTE;
      return Math.max(MIN_HEIGHT, height);
    }

    // Update the stopwatch display
    function updateStopwatch() {
      const timerElement = document.getElementById('activeTimer');
      if (!timerElement || !currentSessionStart) return;
      
      const now = Date.now() / 1000;
      const elapsed = Math.max(0, now - currentSessionStart);
      timerElement.textContent = formatElapsedTime(elapsed);
    }

    // Start the stopwatch
    function startStopwatch(startSeconds, type) {
      if (timerInterval) clearInterval(timerInterval);
      currentSessionStart = startSeconds;
      currentSessionType = type;
      updateStopwatch();
      timerInterval = setInterval(updateStopwatch, 1000);
    }

    // Stop the stopwatch
    function stopStopwatch() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      currentSessionStart = null;
      currentSessionType = null;
    }

    // Render a RUN session card
    function renderRunSession(data, isActive = false) {
      const duration = isActive ? data.calculated_duration : (data.duration_minutes || 0);
      const barHeight = calcBarHeight(duration);
      const startTime = formatTime(data.start);
      const endTime = isActive ? 'now' : formatTime(data.end);
      const pieceCount = data.count || 0;
      
      // Use average_speed from Firebase for completed sessions, calculate for active
      const avgTime = isActive 
        ? calcAvgTime(duration, pieceCount) 
        : (data.average_speed ? formatAvgSpeed(data.average_speed) : calcAvgTime(duration, pieceCount));
      
      const div = document.createElement('div');
      div.className = `relative flex rounded-lg mb-2 overflow-hidden ${isActive ? 'bg-green-900/60 border-l-4 border-green-400' : 'bg-green-900/40 border-l-4 border-green-500'}`;
      div.style.minHeight = `${barHeight}px`;
      if (isActive) div.id = 'activeSession';
      
      div.innerHTML = `
        <div class="flex-1 p-3 flex flex-col justify-between">
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="text-green-400 font-semibold text-sm">${isActive ? '🟢 RUNNING NOW' : 'RUN'}</span>
              <span class="text-white font-bold font-mono ${isActive ? 'tabular-nums' : ''}" ${isActive ? 'id="activeTimer"' : ''}>${isActive ? '--:--' : formatDuration(duration)}</span>
            </div>
            <p class="text-gray-400 text-xs">${startTime} - ${endTime}</p>
          </div>
          <div class="flex items-center justify-between mt-2 pt-2 border-t border-green-800/50">
            <div class="text-center">
              <p class="text-green-300 font-bold text-lg" ${isActive ? 'id="activePieceCount"' : ''}>${pieceCount}</p>
              <p class="text-gray-500 text-xs">pieces</p>
            </div>
            <div class="text-center">
              <p class="text-green-300 font-medium" ${isActive ? 'id="activeAvgCycle"' : ''}>${avgTime}</p>
              <p class="text-gray-500 text-xs">avg speed</p>
            </div>
          </div>
        </div>
      `;
      
      return div;
    }

    // Render a BREAK session card
    function renderBreakSession(data, isActive = false) {
      const duration = isActive ? data.calculated_duration : (data.duration_minutes || 0);
      const barHeight = Math.max(50, calcBarHeight(duration) * 0.6); // Breaks are shorter visually
      const startTime = formatTime(data.start);
      const endTime = isActive ? 'now' : formatTime(data.end);
      
      const div = document.createElement('div');
      div.className = `relative flex rounded-lg mb-2 overflow-hidden ${isActive ? 'bg-yellow-900/60 border-l-4 border-yellow-400' : 'bg-yellow-900/40 border-l-4 border-yellow-500'}`;
      div.style.minHeight = `${barHeight}px`;
      if (isActive) div.id = 'activeSession';
      
      div.innerHTML = `
        <div class="flex-1 p-3 flex flex-col justify-center">
          <div class="flex items-center justify-between">
            <span class="text-yellow-400 font-semibold text-sm">${isActive ? '🟡 BREAK NOW' : 'BREAK'}</span>
            <span class="text-white font-bold font-mono ${isActive ? 'tabular-nums' : ''}" ${isActive ? 'id="activeTimer"' : ''}>${isActive ? '--:--' : formatDuration(duration)}</span>
          </div>
          <p class="text-gray-400 text-xs mt-1">${startTime} - ${endTime}</p>
        </div>
      `;
      
      return div;
    }

    // Render timeline with all sessions
    function renderTimeline(sessions, activeSession) {
      timeline.innerHTML = '';
      
      // Show active session first if exists
      if (activeSession) {
        const isRun = activeSession.type === 'RUN';
        const card = isRun ? renderRunSession(activeSession, true) : renderBreakSession(activeSession, true);
        timeline.appendChild(card);
        
        // Start stopwatch for active session
        if (activeSession.start?.seconds) {
          startStopwatch(activeSession.start.seconds, activeSession.type);
        }
      } else {
        stopStopwatch();
      }
      
      // Show completed sessions (sorted latest first)
      if (sessions.length === 0 && !activeSession) {
        timeline.innerHTML = `
          <div class="text-gray-500 text-center py-8">
            <p>No sessions recorded</p>
            <p class="text-xs mt-1">Sessions appear when the mill runs</p>
          </div>
        `;
        return;
      }
      
      sessions.forEach(session => {
        const isRun = session.type === 'RUN';
        const card = isRun ? renderRunSession(session) : renderBreakSession(session);
        timeline.appendChild(card);
      });
    }

    // Update summary totals
    function updateSummary(dailyData, activeSession) {
      let runMinutes = dailyData?.total_run_minutes || 0;
      let breakMinutes = dailyData?.total_break_minutes || 0;
      let pieceCount = dailyData?.count || 0;
      
      // Add active session duration if today
      if (isToday && activeSession) {
        const duration = activeSession.calculated_duration || 0;
        if (activeSession.type === 'RUN') {
          runMinutes += duration;
        } else {
          breakMinutes += duration;
        }
      }
      
      totalCount.textContent = pieceCount;
      totalRun.textContent = formatDuration(runMinutes);
      totalBreak.textContent = formatDuration(breakMinutes);
    }

    // Initialize display
    dateDisplay.textContent = formatDateLong(dateStr);
    document.getElementById('dateNav').textContent = dateStr;

    // Store data for reactivity
    let cachedDailyData = null;
    let cachedSessions = [];
    let cachedActiveSession = null;

    // Listen to daily summary (real-time)
    const dailyUnsub = onSnapshot(doc(db, 'daily', dateStr), (docSnap) => {
      if (docSnap.exists()) {
        cachedDailyData = docSnap.data();
      } else {
        cachedDailyData = null;
      }
      updateSummary(cachedDailyData, cachedActiveSession);
    }, (error) => {
      console.error('Daily listener error:', error);
    });

    // Listen to live/furnace for active session (only for today)
    let liveUnsub = null;
    if (isToday) {
      liveUnsub = onSnapshot(doc(db, 'live', 'furnace'), (docSnap) => {
        if (docSnap.exists()) {
          const liveData = docSnap.data();
          const currentSession = liveData.current_session;
          
          if (currentSession && currentSession.date === dateStr && !currentSession.end) {
            // Active session exists
            const startSeconds = currentSession.start?.seconds || 0;
            const now = Date.now() / 1000;
            cachedActiveSession = {
              ...currentSession,
              calculated_duration: (now - startSeconds) / 60
            };
            
            // Update active session piece count in real-time
            const activePieceCount = document.getElementById('activePieceCount');
            const activeAvgCycle = document.getElementById('activeAvgCycle');
            if (activePieceCount && cachedActiveSession.type === 'RUN') {
              activePieceCount.textContent = currentSession.count || 0;
              if (activeAvgCycle) {
                activeAvgCycle.textContent = calcAvgTime(cachedActiveSession.calculated_duration, currentSession.count);
              }
            }
          } else {
            cachedActiveSession = null;
          }
          
          updateSummary(cachedDailyData, cachedActiveSession);
          renderTimeline(cachedSessions, cachedActiveSession);
        }
      }, (error) => {
        console.error('Live listener error:', error);
      });
    }

    // Listen to sessions for this date (real-time)
    const sessionsQuery = query(
      collection(db, 'sessions'),
      where('date', '==', dateStr)
    );

    const sessionsUnsub = onSnapshot(sessionsQuery, (snapshot) => {
      loading.classList.add('hidden');
      
      const sessions = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        // Only include completed sessions (have an end time)
        if (data.end) {
          sessions.push({ id: doc.id, ...data });
        }
      });
      
      // Sort by start time descending (latest first)
      sessions.sort((a, b) => {
        const aTime = a.start?.seconds || 0;
        const bTime = b.start?.seconds || 0;
        return bTime - aTime;
      });
      
      cachedSessions = sessions;
      renderTimeline(cachedSessions, cachedActiveSession);
    }, (error) => {
      console.error('Sessions listener error:', error);
      loading.classList.add('hidden');
      timeline.innerHTML = `
        <div class="text-yellow-400 text-center py-4">
          <p>Sessions unavailable</p>
          <p class="text-xs mt-1 text-gray-500">Error: ${error.message}</p>
        </div>
      `;
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      dailyUnsub();
      sessionsUnsub();
      if (liveUnsub) liveUnsub();
      stopStopwatch();
    });

    // Navigation functions
    window.prevDay = function() {
      const date = new Date(dateStr + 'T00:00:00');
      date.setDate(date.getDate() - 1);
      window.location.href = `day.html?date=${date.toISOString().split('T')[0]}`;
    };

    window.nextDay = function() {
      const date = new Date(dateStr + 'T00:00:00');
      date.setDate(date.getDate() + 1);
      const today = new Date().toISOString().split('T')[0];
      const newDate = date.toISOString().split('T')[0];
      if (newDate <= today) {
        window.location.href = `day.html?date=${newDate}`;
      }
    };
  </script>
</head>
<body class="min-h-screen bg-gray-900 text-white pb-16">
  <!-- Navigation -->
  <nav class="bg-gray-800 border-b border-gray-700 px-4 py-2">
    <div class="flex items-center gap-4 overflow-x-auto">
      <a href="index.html" class="text-gray-400 hover:text-white whitespace-nowrap">Live</a>
      <a href="history.html" class="text-gray-400 hover:text-white whitespace-nowrap">History</a>
      <span id="dateNav" class="text-blue-400 font-medium whitespace-nowrap">Today</span>
      <a href="summary.html" class="text-gray-400 hover:text-white whitespace-nowrap">Summary</a>
      <a href="review.html" class="text-gray-400 hover:text-white whitespace-nowrap">Review</a>
    </div>
  </nav>

  <!-- Header with date navigation -->
  <header class="bg-gray-800 px-4 py-3">
    <div class="flex items-center justify-between">
      <button onclick="prevDay()" class="p-2 text-gray-400 hover:text-white active:scale-95 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="text-center">
        <h1 id="dateDisplay" class="text-lg font-bold">Loading...</h1>
      </div>
      <button onclick="nextDay()" class="p-2 text-gray-400 hover:text-white active:scale-95 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4">
    <!-- Loading -->
    <div id="loading" class="text-center py-8">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
      <p class="text-gray-400 mt-2">Loading day data...</p>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="bg-blue-900/30 border border-blue-700 rounded-xl p-3 text-center">
        <p class="text-blue-400 text-xs uppercase">Pieces</p>
        <p id="totalCount" class="text-2xl font-bold text-blue-300">--</p>
      </div>
      <div class="bg-green-900/30 border border-green-700 rounded-xl p-3 text-center">
        <p class="text-green-400 text-xs uppercase">Run</p>
        <p id="totalRun" class="text-2xl font-bold text-green-300">--</p>
      </div>
      <div class="bg-yellow-900/30 border border-yellow-700 rounded-xl p-3 text-center">
        <p class="text-yellow-400 text-xs uppercase">Break</p>
        <p id="totalBreak" class="text-2xl font-bold text-yellow-300">--</p>
      </div>
    </div>

    <!-- Run-wise Timeline -->
    <div class="bg-gray-800 rounded-xl p-4">
      <h2 class="text-gray-400 text-xs uppercase mb-3">Session Timeline</h2>
      <div id="timeline" class="timeline-scroll max-h-[60vh] overflow-y-auto pr-1">
        <!-- Generated dynamically -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 px-4 py-2">
    <div class="flex justify-between text-xs text-gray-500">
      <span>CAM-1 Furnace</span>
      <span>AIS v1.0</span>
    </div>
  </footer>
</body>
</html>
