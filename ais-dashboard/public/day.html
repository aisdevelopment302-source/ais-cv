<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day Detail - AIS Production</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom scrollbar for timeline */
    .timeline-scroll::-webkit-scrollbar {
      width: 4px;
    }
    .timeline-scroll::-webkit-scrollbar-track {
      background: #1f2937;
    }
    .timeline-scroll::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 2px;
    }
  </style>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCBXxSsvjnFzGMMFbHCYouokIQydObeElo",
      authDomain: "ais-production-e013c.firebaseapp.com",
      projectId: "ais-production-e013c",
      storageBucket: "ais-production-e013c.firebasestorage.app",
      messagingSenderId: "565647781984",
      appId: "1:565647781984:web:0f05c2436afdcc7a0b1305"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Get date from URL params
    const urlParams = new URLSearchParams(window.location.search);
    let dateStr = urlParams.get('date') || new Date().toISOString().split('T')[0];

    // Scale: 1 hour = 100px, so 1 minute = 100/60 px
    const PX_PER_MINUTE = 100 / 60;
    const MIN_HEIGHT = 40; // Minimum height for very short sessions

    // Format date for display
    function formatDateLong(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-IN', { 
        weekday: 'long', 
        year: 'numeric',
        month: 'long', 
        day: 'numeric' 
      });
    }

    // Format duration - handles fractional minutes properly
    function formatDuration(minutes) {
      if (minutes === null || minutes === undefined || minutes === 0) return '0m';
      const totalMins = Math.ceil(minutes);
      if (totalMins < 1) return '<1m';
      const hrs = Math.floor(totalMins / 60);
      const mins = totalMins % 60;
      if (hrs > 0) return `${hrs}h ${mins}m`;
      return `${mins}m`;
    }

    // Format time from Firestore timestamp
    function formatTime(timestamp) {
      if (!timestamp) return '--:--';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      return date.toLocaleTimeString('en-IN', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true,
        timeZone: 'Asia/Kolkata'
      });
    }

    // Calculate average time per piece
    function calcAvgTime(durationMinutes, pieceCount) {
      if (!pieceCount || pieceCount === 0) return '--';
      const seconds = (durationMinutes * 60) / pieceCount;
      if (seconds < 60) return `${Math.round(seconds)}s/pc`;
      const mins = Math.floor(seconds / 60);
      const secs = Math.round(seconds % 60);
      return `${mins}m ${secs}s/pc`;
    }

    // Calculate bar height based on duration (1hr = 100px, min 40px)
    function calcBarHeight(durationMinutes) {
      const height = durationMinutes * PX_PER_MINUTE;
      return Math.max(MIN_HEIGHT, height);
    }

    // Load day data
    async function loadDayData() {
      const dateDisplay = document.getElementById('dateDisplay');
      const totalCount = document.getElementById('totalCount');
      const totalRun = document.getElementById('totalRun');
      const totalBreak = document.getElementById('totalBreak');
      const timeline = document.getElementById('timeline');
      const loading = document.getElementById('loading');

      dateDisplay.textContent = formatDateLong(dateStr);
      document.getElementById('dateNav').textContent = dateStr;

      let hasError = false;

      // Load daily summary + current session info
      try {
        const dailyDoc = await getDoc(doc(db, 'daily', dateStr));
        const liveDoc = await getDoc(doc(db, 'live', 'furnace'));
        
        let runMinutes = 0;
        let breakMinutes = 0;
        let pieceCount = 0;
        
        if (dailyDoc.exists()) {
          const data = dailyDoc.data();
          pieceCount = data.count || 0;
          runMinutes = data.total_run_minutes || 0;
          breakMinutes = data.total_break_minutes || 0;
        }
        
        // Add current session duration if viewing today and session is active
        const today = new Date().toISOString().split('T')[0];
        if (dateStr === today && liveDoc.exists()) {
          const liveData = liveDoc.data();
          const currentSession = liveData.current_session;
          
          if (currentSession && currentSession.date === dateStr) {
            // Calculate current session duration from start time
            const startSeconds = currentSession.start?.seconds || 0;
            const now = Date.now() / 1000;
            const currentDuration = (now - startSeconds) / 60; // minutes
            
            if (currentSession.type === 'RUN') {
              runMinutes += currentDuration;
            } else if (currentSession.type === 'BREAK') {
              breakMinutes += currentDuration;
            }
          }
        }
        
        totalCount.textContent = pieceCount;
        totalRun.textContent = formatDuration(runMinutes);
        totalBreak.textContent = formatDuration(breakMinutes);
        
      } catch (error) {
        console.error('Error loading daily summary:', error);
        totalCount.textContent = '0';
        totalRun.textContent = '0m';
        totalBreak.textContent = '0m';
        hasError = true;
      }

      // Hide the main loading indicator
      loading.classList.add('hidden');

      // Load sessions for timeline
      try {
        // First, check for current active session (for today only)
        const today = new Date().toISOString().split('T')[0];
        let currentSession = null;
        
        if (dateStr === today) {
          const liveDoc = await getDoc(doc(db, 'live', 'furnace'));
          if (liveDoc.exists()) {
            const liveData = liveDoc.data();
            if (liveData.current_session && liveData.current_session.date === dateStr) {
              currentSession = liveData.current_session;
              // Calculate current duration
              const startSeconds = currentSession.start?.seconds || 0;
              const now = Date.now() / 1000;
              currentSession.calculated_duration = (now - startSeconds) / 60;
              // Get piece count from daily total minus completed sessions
              currentSession.status = liveData.status;
            }
          }
        }
        
        // Query completed sessions
        const sessionsQuery = query(
          collection(db, 'sessions'),
          where('date', '==', dateStr)
        );
        
        const sessionsSnapshot = await getDocs(sessionsQuery);
        
        timeline.innerHTML = '';
        
        // Show current active session at the top (if today)
        if (currentSession) {
          const isRun = currentSession.type === 'RUN';
          const duration = currentSession.calculated_duration || 0;
          const barHeight = calcBarHeight(duration);
          const startTime = new Date(currentSession.start.seconds * 1000).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' });
          
          const div = document.createElement('div');
          div.className = `relative flex rounded-lg mb-2 overflow-hidden ${isRun ? 'bg-green-900/60 border-l-4 border-green-400' : 'bg-yellow-900/60 border-l-4 border-yellow-400'} animate-pulse`;
          div.style.minHeight = `${barHeight}px`;
          
          if (isRun) {
            div.innerHTML = `
              <div class="flex-1 p-3 flex flex-col justify-between">
                <div>
                  <div class="flex items-center justify-between mb-1">
                    <span class="text-green-400 font-semibold text-sm">🟢 RUNNING NOW</span>
                    <span class="text-white font-bold">${formatDuration(duration)}</span>
                  </div>
                  <p class="text-gray-400 text-xs">${startTime} - now</p>
                </div>
                <div class="flex items-center justify-between mt-2 pt-2 border-t border-green-800/50">
                  <div class="text-center">
                    <p class="text-green-300 font-bold text-lg">--</p>
                    <p class="text-gray-500 text-xs">pieces (active)</p>
                  </div>
                  <div class="text-center">
                    <p class="text-green-300 font-medium">--</p>
                    <p class="text-gray-500 text-xs">avg cycle</p>
                  </div>
                </div>
              </div>
            `;
          } else {
            div.innerHTML = `
              <div class="flex-1 p-3 flex flex-col justify-center">
                <div class="flex items-center justify-between">
                  <span class="text-yellow-400 font-semibold text-sm">🟡 BREAK NOW</span>
                  <span class="text-white font-bold">${formatDuration(duration)}</span>
                </div>
                <p class="text-gray-400 text-xs mt-1">${startTime} - now</p>
              </div>
            `;
          }
          
          timeline.appendChild(div);
        }
        
        if (sessionsSnapshot.empty && !currentSession) {
          timeline.innerHTML = `
            <div class="text-gray-500 text-center py-8">
              <p>No sessions recorded</p>
              <p class="text-xs mt-1">Sessions appear when the mill runs</p>
            </div>
          `;
        } else {
          // Sort client-side: latest first
          const sessions = [];
          sessionsSnapshot.forEach(doc => {
            sessions.push({ id: doc.id, ...doc.data() });
          });
          sessions.sort((a, b) => {
            const aTime = a.start?.toDate?.() || new Date(0);
            const bTime = b.start?.toDate?.() || new Date(0);
            return bTime - aTime; // Descending (latest first)
          });
          
          sessions.forEach(data => {
            const isRun = data.type === 'RUN';
            const duration = data.duration_minutes || 0;
            const barHeight = calcBarHeight(duration);
            const startTime = formatTime(data.start);
            const endTime = formatTime(data.end);
            const pieceCount = data.count || 0;
            const avgTime = calcAvgTime(duration, pieceCount);
            
            const div = document.createElement('div');
            div.className = `relative flex rounded-lg mb-2 overflow-hidden ${isRun ? 'bg-green-900/40 border-l-4 border-green-500' : 'bg-yellow-900/40 border-l-4 border-yellow-500'}`;
            div.style.minHeight = `${barHeight}px`;
            
            if (isRun) {
              // RUN session - show all details
              div.innerHTML = `
                <div class="flex-1 p-3 flex flex-col justify-between">
                  <div>
                    <div class="flex items-center justify-between mb-1">
                      <span class="text-green-400 font-semibold text-sm">RUN</span>
                      <span class="text-white font-bold">${formatDuration(duration)}</span>
                    </div>
                    <p class="text-gray-400 text-xs">${startTime} - ${endTime}</p>
                  </div>
                  <div class="flex items-center justify-between mt-2 pt-2 border-t border-green-800/50">
                    <div class="text-center">
                      <p class="text-green-300 font-bold text-lg">${pieceCount}</p>
                      <p class="text-gray-500 text-xs">pieces</p>
                    </div>
                    <div class="text-center">
                      <p class="text-green-300 font-medium">${avgTime}</p>
                      <p class="text-gray-500 text-xs">avg cycle</p>
                    </div>
                  </div>
                </div>
              `;
            } else {
              // BREAK session - simpler display
              div.innerHTML = `
                <div class="flex-1 p-3 flex flex-col justify-center">
                  <div class="flex items-center justify-between">
                    <span class="text-yellow-400 font-semibold text-sm">BREAK</span>
                    <span class="text-white font-bold">${formatDuration(duration)}</span>
                  </div>
                  <p class="text-gray-400 text-xs mt-1">${startTime} - ${endTime}</p>
                </div>
              `;
            }
            
            timeline.appendChild(div);
          });
        }
      } catch (error) {
        console.error('Error loading sessions:', error);
        timeline.innerHTML = `
          <div class="text-yellow-400 text-center py-4">
            <p>Sessions unavailable</p>
            <p class="text-xs mt-1 text-gray-500">May require database index setup</p>
          </div>
        `;
      }

      // Show error banner only if there were critical errors
      if (hasError) {
        const errorBanner = document.createElement('div');
        errorBanner.className = 'bg-red-900/50 border border-red-600 rounded-lg p-3 text-center mb-4';
        errorBanner.innerHTML = '<p class="text-red-200 text-sm">Some data could not be loaded</p>';
        timeline.parentElement.insertBefore(errorBanner, timeline);
      }
    }

    // Navigation functions
    window.prevDay = function() {
      const date = new Date(dateStr + 'T00:00:00');
      date.setDate(date.getDate() - 1);
      window.location.href = `day.html?date=${date.toISOString().split('T')[0]}`;
    };

    window.nextDay = function() {
      const date = new Date(dateStr + 'T00:00:00');
      date.setDate(date.getDate() + 1);
      const today = new Date().toISOString().split('T')[0];
      const newDate = date.toISOString().split('T')[0];
      if (newDate <= today) {
        window.location.href = `day.html?date=${newDate}`;
      }
    };

    // Load on page ready
    loadDayData();
  </script>
</head>
<body class="min-h-screen bg-gray-900 text-white pb-16">
  <!-- Navigation -->
  <nav class="bg-gray-800 border-b border-gray-700 px-4 py-2">
    <div class="flex items-center gap-4 overflow-x-auto">
      <a href="index.html" class="text-gray-400 hover:text-white whitespace-nowrap">Live</a>
      <a href="history.html" class="text-gray-400 hover:text-white whitespace-nowrap">History</a>
      <span id="dateNav" class="text-blue-400 font-medium whitespace-nowrap">Today</span>
      <a href="summary.html" class="text-gray-400 hover:text-white whitespace-nowrap">Summary</a>
      <a href="review.html" class="text-gray-400 hover:text-white whitespace-nowrap">Review</a>
    </div>
  </nav>

  <!-- Header with date navigation -->
  <header class="bg-gray-800 px-4 py-3">
    <div class="flex items-center justify-between">
      <button onclick="prevDay()" class="p-2 text-gray-400 hover:text-white active:scale-95 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="text-center">
        <h1 id="dateDisplay" class="text-lg font-bold">Loading...</h1>
      </div>
      <button onclick="nextDay()" class="p-2 text-gray-400 hover:text-white active:scale-95 transition-transform">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4">
    <!-- Loading -->
    <div id="loading" class="text-center py-8">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
      <p class="text-gray-400 mt-2">Loading day data...</p>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="bg-blue-900/30 border border-blue-700 rounded-xl p-3 text-center">
        <p class="text-blue-400 text-xs uppercase">Pieces</p>
        <p id="totalCount" class="text-2xl font-bold text-blue-300">--</p>
      </div>
      <div class="bg-green-900/30 border border-green-700 rounded-xl p-3 text-center">
        <p class="text-green-400 text-xs uppercase">Run</p>
        <p id="totalRun" class="text-2xl font-bold text-green-300">--</p>
      </div>
      <div class="bg-yellow-900/30 border border-yellow-700 rounded-xl p-3 text-center">
        <p class="text-yellow-400 text-xs uppercase">Break</p>
        <p id="totalBreak" class="text-2xl font-bold text-yellow-300">--</p>
      </div>
    </div>

    <!-- Run-wise Timeline -->
    <div class="bg-gray-800 rounded-xl p-4">
      <h2 class="text-gray-400 text-xs uppercase mb-3">Run-wise Timeline</h2>
      <div id="timeline" class="timeline-scroll max-h-[60vh] overflow-y-auto pr-1">
        <!-- Generated dynamically -->
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 px-4 py-2">
    <div class="flex justify-between text-xs text-gray-500">
      <span>CAM-1 Furnace</span>
      <span>AIS v1.0</span>
    </div>
  </footer>
</body>
</html>
