<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - AIS Production</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, query, orderBy, limit, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCBXxSsvjnFzGMMFbHCYouokIQydObeElo",
      authDomain: "ais-production-e013c.firebaseapp.com",
      projectId: "ais-production-e013c",
      storageBucket: "ais-production-e013c.firebasestorage.app",
      messagingSenderId: "565647781984",
      appId: "1:565647781984:web:0f05c2436afdcc7a0b1305"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Format date for display
    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-IN', { 
        weekday: 'short', 
        month: 'short', 
        day: 'numeric' 
      });
    }

    // Format duration - handles fractional minutes properly
    function formatDuration(minutes) {
      if (minutes === null || minutes === undefined || minutes === 0) return '0m';
      // Round up any fractional minutes so they're visible
      const totalMins = Math.ceil(minutes);
      if (totalMins < 1) return '<1m';
      const hrs = Math.floor(totalMins / 60);
      const mins = totalMins % 60;
      if (hrs > 0) return `${hrs}h ${mins}m`;
      return `${mins}m`;
    }

    // Load history data
    async function loadHistory() {
      const historyList = document.getElementById('historyList');
      const loadingIndicator = document.getElementById('loading');
      
      try {
        const dailyQuery = query(
          collection(db, 'daily'),
          orderBy('date', 'desc'),
          limit(30)
        );
        
        const snapshot = await getDocs(dailyQuery);
        
        loadingIndicator.classList.add('hidden');
        
        if (snapshot.empty) {
          historyList.innerHTML = `
            <div class="text-gray-500 text-center py-8">
              No production data yet.<br>
              Data will appear once the counter starts running.
            </div>
          `;
          return;
        }
        
        snapshot.forEach((doc) => {
          const data = doc.data();
          const dateStr = data.date || doc.id;
          
          const div = document.createElement('a');
          div.href = `day.html?date=${dateStr}`;
          div.className = 'block bg-gray-800 rounded-xl p-4 mb-3 hover:bg-gray-700 transition-colors';
          
          const runMins = data.total_run_minutes || 0;
          const breakMins = data.total_break_minutes || 0;
          const totalMins = runMins + breakMins;
          const runPercent = totalMins > 0 ? (runMins / totalMins) * 100 : 0;
          
          div.innerHTML = `
            <div class="flex justify-between items-start mb-2">
              <div>
                <p class="font-medium text-white">${formatDate(dateStr)}</p>
                <p class="text-xs text-gray-500">${dateStr}</p>
              </div>
              <div class="text-right">
                <p class="text-2xl font-bold text-blue-400">${data.count || 0}</p>
                <p class="text-xs text-gray-500">pieces</p>
              </div>
            </div>
            
            <!-- Progress bar -->
            <div class="h-2 bg-gray-700 rounded-full overflow-hidden mb-2">
              <div class="h-full bg-green-500" style="width: ${runPercent}%"></div>
            </div>
            
            <div class="flex justify-between text-xs">
              <span class="text-green-400">Run: ${formatDuration(runMins)}</span>
              <span class="text-yellow-400">Break: ${formatDuration(breakMins)}</span>
            </div>
          `;
          
          historyList.appendChild(div);
        });
        
      } catch (error) {
        console.error('Error loading history:', error);
        loadingIndicator.innerHTML = `
          <div class="text-red-400 text-center py-4">
            Error loading data. Please try again.
          </div>
        `;
      }
    }

    // Load on page ready
    loadHistory();
  </script>
</head>
<body class="min-h-screen bg-gray-900 text-white pb-16">
  <!-- Navigation -->
  <nav class="bg-gray-800 border-b border-gray-700 px-4 py-2">
    <div class="flex items-center gap-4 overflow-x-auto">
      <a href="index.html" class="text-gray-400 hover:text-white whitespace-nowrap">Live</a>
      <a href="history.html" class="text-blue-400 font-medium whitespace-nowrap">History</a>
      <a href="day.html" class="text-gray-400 hover:text-white whitespace-nowrap">Today</a>
      <a href="summary.html" class="text-gray-400 hover:text-white whitespace-nowrap">Summary</a>
      <a href="review.html" class="text-gray-400 hover:text-white whitespace-nowrap">Review</a>
    </div>
  </nav>

  <!-- Header -->
  <header class="bg-gray-800 px-4 py-3">
    <h1 class="text-xl font-bold">Production History</h1>
    <p class="text-sm text-gray-400">Last 30 days</p>
  </header>

  <!-- Main Content -->
  <main class="p-4">
    <!-- Loading Indicator -->
    <div id="loading" class="text-center py-8">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
      <p class="text-gray-400 mt-2">Loading history...</p>
    </div>
    
    <!-- History List -->
    <div id="historyList"></div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 px-4 py-2">
    <div class="flex justify-between text-xs text-gray-500">
      <span>CAM-1 Furnace</span>
      <span>AIS v1.0</span>
    </div>
  </footer>
</body>
</html>
