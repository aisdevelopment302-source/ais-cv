<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS Production Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCBXxSsvjnFzGMMFbHCYouokIQydObeElo",
      authDomain: "ais-production-e013c.firebaseapp.com",
      projectId: "ais-production-e013c",
      storageBucket: "ais-production-e013c.firebasestorage.app",
      messagingSenderId: "565647781984",
      appId: "1:565647781984:web:0f05c2436afdcc7a0b1305"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ============ NOTIFICATIONS ============
    let notificationsEnabled = false;
    let previousStatus = null; // Track status changes
    let isFirstLoad = true; // Don't notify on initial page load

    // Request notification permission
    async function requestNotificationPermission() {
      if (!('Notification' in window)) {
        console.log('This browser does not support notifications');
        return false;
      }
      
      if (Notification.permission === 'granted') {
        return true;
      }
      
      if (Notification.permission !== 'denied') {
        const permission = await Notification.requestPermission();
        return permission === 'granted';
      }
      
      return false;
    }

    // Send a notification
    function sendNotification(title, body, icon = '🏭') {
      if (!notificationsEnabled || Notification.permission !== 'granted') return;
      
      try {
        const notification = new Notification(title, {
          body: body,
          icon: icon === '🟢' ? '/icons/run.png' : (icon === '🟡' ? '/icons/break.png' : '/icons/mill.png'),
          badge: '/icons/badge.png',
          tag: 'ais-status', // Replace previous notification
          renotify: true,
          vibrate: [200, 100, 200]
        });
        
        // Auto close after 5 seconds
        setTimeout(() => notification.close(), 5000);
        
        // Focus app on click
        notification.onclick = function() {
          window.focus();
          notification.close();
        };
      } catch (e) {
        console.error('Notification error:', e);
      }
    }

    // Handle status change and send notification
    function handleStatusChange(newStatus, data) {
      // Skip notification on first load
      if (isFirstLoad) {
        isFirstLoad = false;
        previousStatus = newStatus;
        return;
      }
      
      // Only notify if status actually changed
      if (previousStatus === newStatus) return;
      
      const oldStatus = previousStatus;
      previousStatus = newStatus;
      
      // Send notification based on new status
      if (newStatus === 'RUNNING' && oldStatus === 'BREAK') {
        sendNotification(
          '🟢 Mill Running',
          'Production has resumed',
          '🟢'
        );
      } else if (newStatus === 'BREAK' && oldStatus === 'RUNNING') {
        const count = data.today_count || 0;
        sendNotification(
          '🟡 Break Started',
          `Production paused. Today's count: ${count} pieces`,
          '🟡'
        );
      }
    }

    // Toggle notifications button handler
    window.toggleNotifications = async function() {
      const btn = document.getElementById('notifBtn');
      const status = document.getElementById('notifStatus');
      
      if (notificationsEnabled) {
        // Disable
        notificationsEnabled = false;
        btn.textContent = '🔔';
        btn.title = 'Enable notifications';
        status.textContent = '';
      } else {
        // Try to enable
        const granted = await requestNotificationPermission();
        if (granted) {
          notificationsEnabled = true;
          btn.textContent = '🔕';
          btn.title = 'Disable notifications';
          status.textContent = '✓';
          // Send test notification
          sendNotification('🏭 Notifications Enabled', 'You will be notified when status changes');
        } else {
          status.textContent = '✗';
          alert('Notification permission denied. Please enable in browser settings.');
        }
      }
    };

    // Check if notifications were previously enabled (localStorage)
    async function initNotifications() {
      const wasEnabled = localStorage.getItem('ais-notifications') === 'true';
      if (wasEnabled && Notification.permission === 'granted') {
        notificationsEnabled = true;
        const btn = document.getElementById('notifBtn');
        const status = document.getElementById('notifStatus');
        if (btn) btn.textContent = '🔕';
        if (status) status.textContent = '✓';
      }
    }

    // Save notification preference
    function saveNotificationPreference() {
      localStorage.setItem('ais-notifications', notificationsEnabled ? 'true' : 'false');
    }
    window.addEventListener('beforeunload', saveNotificationPreference);

    // Initialize notifications on load
    initNotifications();

    // DOM elements
    const countDisplay = document.getElementById('count');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const lastUpdateDisplay = document.getElementById('lastUpdate');
    const lastTravelDisplay = document.getElementById('lastTravel');
    const statusDisplay = document.getElementById('statusValue');
    const runTimeDisplay = document.getElementById('runTime');
    const breakTimeDisplay = document.getElementById('breakTime');
    const connectionStatus = document.getElementById('connectionStatus');
    const todayLink = document.getElementById('todayLink');
    const segmentTimerDisplay = document.getElementById('segmentTimer');
    const segmentLabelDisplay = document.getElementById('segmentLabel');

    // Stopwatch timer state
    let segmentStartTime = null;
    let currentSegmentType = null;
    let timerInterval = null;

    // Format elapsed time as HH:MM:SS or MM:SS
    function formatElapsedTime(seconds) {
      const hrs = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      
      if (hrs > 0) {
        return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      }
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Update the stopwatch display
    function updateStopwatch() {
      if (!segmentStartTime) {
        segmentTimerDisplay.textContent = '--:--';
        return;
      }
      
      const now = Date.now() / 1000; // current time in seconds
      const elapsed = Math.max(0, now - segmentStartTime);
      segmentTimerDisplay.textContent = formatElapsedTime(elapsed);
    }

    // Start the stopwatch timer
    function startStopwatchTimer() {
      if (timerInterval) clearInterval(timerInterval);
      updateStopwatch();
      timerInterval = setInterval(updateStopwatch, 1000);
    }

    // Set today's date link
    const today = new Date().toISOString().split('T')[0];
    todayLink.href = `day.html?date=${today}`;

    // Format duration - handles fractional minutes properly
    function formatDuration(minutes) {
      if (minutes === null || minutes === undefined || minutes === 0) return '0m';
      // Round up any fractional minutes so they're visible
      const totalMins = Math.ceil(minutes);
      if (totalMins < 1) return '<1m';
      const hrs = Math.floor(totalMins / 60);
      const mins = totalMins % 60;
      if (hrs > 0) return `${hrs}h ${mins}m`;
      return `${mins}m`;
    }

    // Listen to live data
    onSnapshot(doc(db, 'live', 'mill_stand'), (doc) => {
      if (doc.exists()) {
        const data = doc.data();
        
        // Update count
        countDisplay.textContent = data.today_count || 0;
        
        // Update status
        const status = data.status || 'OFFLINE';
        statusDisplay.textContent = status;
        
        // Handle status change for notifications
        handleStatusChange(status, data);
        
        if (status === 'RUNNING') {
          statusDot.className = 'w-3 h-3 rounded-full bg-green-500 animate-pulse';
          statusText.textContent = 'Mill Running';
        } else if (status === 'BREAK') {
          statusDot.className = 'w-3 h-3 rounded-full bg-yellow-500';
          statusText.textContent = 'Break';
        } else {
          statusDot.className = 'w-3 h-3 rounded-full bg-red-500';
          statusText.textContent = 'Offline';
        }
        
        // Update last travel time
        lastTravelDisplay.textContent = data.last_avg_travel_time ? 
          data.last_avg_travel_time.toFixed(1) + 's' : '--';
        
        // Update last count time
        if (data.last_count) {
          const time = data.last_count.toDate();
          lastUpdateDisplay.textContent = time.toLocaleTimeString();
        }
        
        // Update stopwatch timer based on current session
        const currentSession = data.current_session;
        if (currentSession && currentSession.start) {
          const newStartTime = currentSession.start.seconds;
          const newSegmentType = currentSession.type;
          
          // Only restart timer if segment changed
          if (segmentStartTime !== newStartTime || currentSegmentType !== newSegmentType) {
            segmentStartTime = newStartTime;
            currentSegmentType = newSegmentType;
            
            // Update label
            if (newSegmentType === 'RUN') {
              segmentLabelDisplay.textContent = 'Running For';
              segmentLabelDisplay.className = 'text-green-400 text-xs uppercase';
            } else if (newSegmentType === 'BREAK') {
              segmentLabelDisplay.textContent = 'Break For';
              segmentLabelDisplay.className = 'text-yellow-400 text-xs uppercase';
            }
            
            startStopwatchTimer();
          }
        } else {
          // No active session
          segmentStartTime = null;
          currentSegmentType = null;
          segmentLabelDisplay.textContent = 'Segment Timer';
          segmentLabelDisplay.className = 'text-gray-400 text-xs uppercase';
          segmentTimerDisplay.textContent = '--:--';
          if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
          }
        }
        
        connectionStatus.classList.add('hidden');
      }
    }, (error) => {
      console.error('Firestore error:', error);
      connectionStatus.classList.remove('hidden');
    });

    // Listen to today's daily stats
    onSnapshot(doc(db, 'daily', `${today}_cam2`), (doc) => {
      if (doc.exists()) {
        const data = doc.data();
        runTimeDisplay.textContent = formatDuration(data.total_run_minutes || 0);
        breakTimeDisplay.textContent = formatDuration(data.total_break_minutes || 0);
      }
    });
  </script>
</head>
<body class="min-h-screen bg-gray-900 text-white pb-16">
  <!-- Navigation -->
  <nav class="bg-gray-800 border-b border-gray-700 px-4 py-2">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4 overflow-x-auto">
        <a href="index.html" class="text-blue-400 font-medium whitespace-nowrap">Live</a>
        <a href="history.html" class="text-gray-400 hover:text-white whitespace-nowrap">History</a>
        <a id="todayLink" href="day.html" class="text-gray-400 hover:text-white whitespace-nowrap">Today</a>
        <a href="summary.html" class="text-gray-400 hover:text-white whitespace-nowrap">Summary</a>
      </div>
      <div class="flex items-center gap-2">
        <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></div>
        <span id="statusText" class="text-sm text-gray-300">Connecting...</span>
      </div>
    </div>
  </nav>

  <!-- Header -->
  <header class="bg-gray-800 px-4 py-3">
    <div class="flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">AIS Production</h1>
        <p class="text-sm text-gray-400">Mill Stand Counter (CAM-2)</p>
      </div>
      <button 
        id="notifBtn" 
        onclick="toggleNotifications()" 
        class="text-2xl p-2 hover:bg-gray-700 rounded-lg transition-colors relative"
        title="Enable notifications"
      >
        🔔
        <span id="notifStatus" class="absolute -top-1 -right-1 text-xs text-green-400"></span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="p-4">
    <!-- Big Count Card -->
    <div class="bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl p-6 mb-4 shadow-lg">
      <div class="text-center">
        <p class="text-blue-200 text-sm uppercase tracking-wider mb-2">Pieces Today</p>
        <p id="count" class="text-7xl font-bold tabular-nums">--</p>
        <p class="text-blue-200 text-sm mt-2">
          Last count: <span id="lastUpdate">--:--:--</span>
        </p>
      </div>
    </div>

    <!-- Stats Grid -->
    <div class="grid grid-cols-3 gap-3 mb-4">
      <div class="bg-gray-800 rounded-xl p-4">
        <p class="text-gray-400 text-xs uppercase">Last Travel</p>
        <p id="lastTravel" class="text-2xl font-bold">--</p>
      </div>
      <div class="bg-gray-800 rounded-xl p-4">
        <p class="text-gray-400 text-xs uppercase">Status</p>
        <p id="statusValue" class="text-2xl font-bold">--</p>
      </div>
      <div class="bg-gray-800 rounded-xl p-4">
        <p id="segmentLabel" class="text-gray-400 text-xs uppercase">Segment Timer</p>
        <p id="segmentTimer" class="text-2xl font-bold font-mono tabular-nums">--:--</p>
      </div>
    </div>

    <!-- Run/Break Time -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div class="bg-green-900/30 border border-green-700 rounded-xl p-4">
        <p class="text-green-400 text-xs uppercase">Run Time</p>
        <p id="runTime" class="text-2xl font-bold text-green-300">--</p>
      </div>
      <div class="bg-yellow-900/30 border border-yellow-700 rounded-xl p-4">
        <p class="text-yellow-400 text-xs uppercase">Break Time</p>
        <p id="breakTime" class="text-2xl font-bold text-yellow-300">--</p>
      </div>
    </div>

    <!-- Latest Photo and Recent Counts panels removed (CAM-2 does not write to counts/) -->

    <!-- Connection Error -->
    <div id="connectionStatus" class="mt-4 bg-red-900/50 border border-red-600 rounded-lg p-3 text-center hidden">
      <p class="text-red-200 text-sm">Connection error - retrying...</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 left-0 right-0 bg-gray-800 border-t border-gray-700 px-4 py-2">
    <div class="flex justify-between text-xs text-gray-500">
      <span>CAM-2 Mill Stand</span>
      <span>AIS v1.0</span>
    </div>
  </footer>
</body>
</html>
